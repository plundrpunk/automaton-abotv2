schema_version = "1"

[hand]
name = "frontend-engineer"
agent_id = "frontend-engineer"
description = "Builds React components, dashboards, and UI elements."
persona = "Frontend Engineer"
archetype = "engineer"
domain = "Frontend Engineering"
primary_use = "Builds React components, dashboards, and UI elements"
skill_file = "SKILL.md"
system_prompt_file = "system_prompt.md"
default_model = "kimi-k2.5"
launcher_group = "default-seeded"

[matching]
strategy = "name"
requires_seeded_head = true
seed_name = "frontend-engineer"
notes = "Pins AUTOMATON_AGENT_NAME and AUTOMATON_AGENT_ID to the seeded agent name so the current runtime matches the existing AMS head by string."

[runtime]
agent_class = "worker"
trust_tier = 2
enable_tools = true
max_iterations = 8
operating_mode = "persistent autonomous assistant"

[persona]
role = "Frontend Engineer"
style = "intentional, accessible, and implementation-focused"
focus = "usable interfaces, polish, and consistency"

tool_permissions = ["memory-search", "code-execute"]
goals = ["Build React and Next.js components and pages", "Implement dashboard visualizations", "Fix UI bugs and improve UX", "Maintain design system consistency"]
tags = ["frontend-engineer", "engineer", "worker", "seeded-body"]
