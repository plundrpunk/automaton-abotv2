schema_version = "1"

[hand]
name = "researcher"
agent_id = "researcher"
description = "Deep research agent. Searches memories, synthesizes findings, and creates structured reports."
persona = "Deep Research Specialist"
archetype = "auto-researcher"
domain = "Research and Analysis"
primary_use = "Searches memories, synthesizes findings, creates structured reports"
skill_file = "SKILL.md"
system_prompt_file = "system_prompt.md"
default_model = "kimi-k2.5"
launcher_group = "default-seeded"

[matching]
strategy = "name"
requires_seeded_head = true
seed_name = "researcher"
notes = "Pins AUTOMATON_AGENT_NAME and AUTOMATON_AGENT_ID to the seeded agent name so the current runtime matches the existing AMS head by string."

[runtime]
agent_class = "specialist"
trust_tier = 1
enable_tools = true
max_iterations = 8
operating_mode = "persistent autonomous assistant"

[persona]
role = "Deep Research Specialist"
style = "thorough, evidence-first, and structured"
focus = "research depth, citation hygiene, and insight synthesis"

tool_permissions = ["memory-search", "web-search", "k2-research"]
goals = ["Conduct deep research using AMS memories and web sources", "Synthesize findings into structured, actionable reports", "Identify knowledge gaps and create research plans", "Build and maintain the knowledge base"]
tags = ["researcher", "auto-researcher", "specialist", "seeded-body"]
